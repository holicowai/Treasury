function DistrictFundTab({ setActive }) {
  // DISTRICTS_INIT is now module-level (before TDFCalculator) — shared with TaxAllocation
  // ── state ──────────────────────────────────────────────────────────

  const FUND_FIELDS = [
    { label:'Fund 10 Education',    key:'ed',    col:'text-blue-700'   },
    { label:'Fund 20 O&M',          key:'om',    col:'text-purple-700' },
    { label:'Fund 30 Debt Svc',     key:'ds',    col:'text-red-700'    },
    { label:'Fund 40 Transport',    key:'tr',    col:'text-green-700'  },
    { label:'Fund 50 IMRF',         key:'cap',   col:'text-orange-700' },
    { label:'Fund 60 Cap. Proj.',   key:'other', col:'text-gray-600'   },
  ];

  const [districtData, setDistrictData]     = React.useState(() => DISTRICTS_INIT.map(d => ({...d})));
  const [editDraft,    setEditDraft]         = React.useState(null);   // null | {idx, num, name, ed, om, ds, tr, cap, other}
  const [boardDate,    setBoardDate]         = React.useState('');
  const [validationError, setValidationError] = React.useState('');
  const [savedToast,   setSavedToast]        = React.useState(false);
  const [showHistory,  setShowHistory]       = React.useState(false);
  const [changeHistory, setChangeHistory]    = React.useState([
    { when:'Jan 15, 2025', who:'Paul Bellisario',  dist:'All 18 districts', change:'Annual levy update — FY2025 board-approved rates', approval:'Jan 15, 2025' },
    { when:'Mar 5, 2024',  who:'Hope Allen',       dist:'Dist 205 (Proviso East HS)', change:'Fund 30 Debt Svc corrected 11.0% \u2192 11.3%',    approval:'Mar 5, 2024'  },
    { when:'Jan 12, 2023', who:'Paul Bellisario',  dist:'All 18 districts', change:'Annual levy update — FY2023 board-approved rates', approval:'Jan 12, 2023' },
  ]);

  // ── computed ──────────────────────────────────────────────────────────
  const draftTotal = editDraft
    ? parseFloat((editDraft.ed + editDraft.om + editDraft.ds + editDraft.tr + editDraft.cap + editDraft.other).toFixed(2))
    : 0;
  const draftOk = Math.abs(draftTotal - 100) < 0.01;

  // ── handlers ────────────────────────────────────────────────────────────
  const openEdit = (i) => {
    setEditDraft({ idx: i, ...districtData[i] });
    setBoardDate('');
    setValidationError('');
  };

  const updateDraft = (key, raw) => {
    const val = parseFloat(raw) || 0;
    setEditDraft(prev => ({ ...prev, [key]: val }));
    setValidationError('');
  };

  const handleSave = () => {
    if (!draftOk) {
      setValidationError('Total must equal 100.00% \u2014 currently ' + draftTotal.toFixed(2) + '%. Adjust fund percentages before saving.');
      return;
    }
    if (!boardDate) {
      setValidationError('Board approval date is required before saving levy changes.');
      return;
    }
    const { idx, ed, om, ds, tr, cap, other, num } = editDraft;
    setDistrictData(prev => prev.map((d, i) => i === idx ? { ...d, ed, om, ds, tr, cap, other } : d));
    const fmtDate = new Date(boardDate + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    setChangeHistory(prev => [{ when: fmtDate, who:'Paul Bellisario', dist:'Dist ' + num, change:'Levy percentages updated', approval: fmtDate }, ...prev]);
    setEditDraft(null);
    setBoardDate('');
    setValidationError('');
    setSavedToast(true);
    setTimeout(() => setSavedToast(false), 3500);
  };

  // ── render ───────────────────────────────────────────────────────────────
  return (
    <div className="p-6 max-w-7xl mx-auto">

      {savedToast && (
        <div className="mb-3 p-3 bg-green-100 border border-green-300 rounded-xl text-sm text-green-800 font-semibold">
          &#10003; Levy percentages saved — changes logged with board approval date. TDF Calculator and Tax Allocation Engine will use updated values on next cycle.
        </div>
      )}

      <SectionHeader title="District &amp; Fund Configuration" sub="18 districts &middot; Levy percentages drive TDF quarterly allocation and Tax Allocation Engine calculations" helpScreen="settings" 
        section="ADMINISTRATION"/>

      <AnnotationBadge type="pain" text="These levy percentages are the foundation of both the TDF Calculator and Tax Allocation Engine. Currently they live only in Hope's Excel file — undocumented, no version history, single point of failure. Holicow makes them explicit, auditable, and board-traceable." />

      {/* Downstream impact signal */}
      <div className="mt-4 p-3.5 bg-purple-50 border border-purple-200 rounded-xl text-xs text-purple-800 mb-4 flex items-start gap-2">
        <span className="flex-shrink-0 mt-0.5">&#128260;</span>
        <div>
          <span className="font-semibold">Downstream impact:</span> These percentages are the single source of truth for two calculations. The <strong>TDF Calculator</strong> uses them to split quarterly interest across funds per district. The <strong>Tax Allocation Engine</strong> uses them to allocate tax receipts to the correct fund. Any change here flows through both automatically on the next cycle.
          <button onClick={() => setActive('tdf')} style={{background:'none',border:'none',padding:0,cursor:'pointer'}} className="ml-2 underline font-semibold text-purple-800">TDF Calculator &#8594;</button>
          <button onClick={() => setActive('taxalloc')} style={{background:'none',border:'none',padding:0,cursor:'pointer'}} className="ml-2 underline font-semibold text-purple-800">Tax Allocation &#8594;</button>
        </div>
      </div>

      {/* KPI cards */}
      <div className="grid grid-cols-4 gap-4 mb-5">
        <div className="card p-4 text-center">
          <div className="text-2xl font-bold" style={{color:'var(--purple)'}}>18</div>
          <div className="text-xs text-gray-500 mt-1">Configured Districts</div>
        </div>
        <div className="card p-4 text-center">
          <div className="text-2xl font-bold text-green-600">6</div>
          <div className="text-xs text-gray-500 mt-1">Fund Types per District</div>
        </div>
        <div className="card p-4 text-center">
          <div className="text-2xl font-bold text-blue-600">Jan 2025</div>
          <div className="text-xs text-gray-500 mt-1">Last Board-Approved Levy</div>
        </div>
        <div className="card p-4 text-center cursor-pointer hover:bg-gray-50 transition" onClick={() => setShowHistory(h => !h)}>
          <div className="text-2xl font-bold text-amber-600">{changeHistory.length}</div>
          <div className="text-xs text-gray-500 mt-1">{showHistory ? 'Hide' : 'View'} Change History</div>
        </div>
      </div>

      {/* Change history panel */}
      {showHistory && (
        <div className="card p-4 mb-5 border-l-4 border-amber-400">
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs font-bold text-gray-600 uppercase tracking-wide">&#128221; Change History — Board-Approved Levy Updates</div>
            <button onClick={() => setShowHistory(false)} className="text-xs text-gray-400 hover:text-gray-600">&#10005; Close</button>
          </div>
          <div className="space-y-2">
            {changeHistory.map((h, i) => (
              <div key={i} className="flex items-start gap-3 text-xs border-b border-gray-50 pb-2">
                <span className="flex-shrink-0 font-mono text-gray-400 w-24">{h.when}</span>
                <span className="flex-shrink-0 text-blue-700 font-semibold w-20">{h.dist}</span>
                <span className="flex-1 text-gray-700">{h.change}</span>
                <span className="flex-shrink-0 text-green-700 font-semibold">Board: {h.approval}</span>
              </div>
            ))}
          </div>
          <div className="mt-2 text-xs text-gray-400">Full audit trail stored in <code>district_fund_config_history</code> · Immutable once board date is set</div>
        </div>
      )}

      <div className="flex justify-between items-center mb-3">
        <p className="text-sm font-semibold text-gray-700">Levy Allocation by Fund — All 18 Districts</p>
        <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 px-3 py-1 rounded-full font-semibold">Updates require Board approval</div>
      </div>

      {/* Main table */}
      <div className="card overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-xs" style={{minWidth:'820px'}}>
            <thead>
              <tr className="bg-gray-50 border-b border-gray-100">
                <th className="text-left px-3 py-3 font-semibold text-gray-500 uppercase tracking-wide">District</th>
                <th className="text-right px-3 py-3 font-semibold text-blue-600 uppercase tracking-wide">Fund 10 Education</th>
                <th className="text-right px-3 py-3 font-semibold text-purple-600 uppercase tracking-wide">Fund 20 O&amp;M</th>
                <th className="text-right px-3 py-3 font-semibold text-red-600 uppercase tracking-wide">Fund 30 Debt Svc</th>
                <th className="text-right px-3 py-3 font-semibold text-green-600 uppercase tracking-wide">Fund 40 Transport</th>
                <th className="text-right px-3 py-3 font-semibold text-orange-600 uppercase tracking-wide">Fund 50 IMRF</th>
                <th className="text-right px-3 py-3 font-semibold text-gray-500 uppercase tracking-wide">Fund 60 Cap. Proj.</th>
                <th className="text-right px-3 py-3 font-semibold text-gray-700 uppercase tracking-wide">Total</th>
                <th className="px-3 py-3"></th>
              </tr>
            </thead>
            <tbody>
              {districtData.map((d, i) => {
                const total = parseFloat((d.ed + d.om + d.ds + d.tr + d.cap + d.other).toFixed(2));
                const isEditing = editDraft && editDraft.idx === i;
                return (
                  <tr key={i} className={`border-b border-gray-50 hover:bg-gray-50 ${isEditing ? 'bg-purple-50/40' : ''}`}>
                    <td className="px-3 py-2.5">
                      <div className="font-semibold text-gray-900">Dist {d.num}</div>
                      <div className="text-gray-400">{d.name}</div>
                    </td>
                    <td className="px-3 py-2.5 text-right font-mono text-blue-700">{d.ed}%</td>
                    <td className="px-3 py-2.5 text-right font-mono text-purple-700">{d.om}%</td>
                    <td className="px-3 py-2.5 text-right font-mono text-red-700">{d.ds}%</td>
                    <td className="px-3 py-2.5 text-right font-mono text-green-700">{d.tr}%</td>
                    <td className="px-3 py-2.5 text-right font-mono text-orange-700">{d.cap}%</td>
                    <td className="px-3 py-2.5 text-right font-mono text-gray-500">{d.other}%</td>
                    <td className="px-3 py-2.5 text-right font-mono font-bold">
                      <span className={Math.abs(total-100)<0.01 ? 'text-green-600' : 'text-red-600'}>{total.toFixed(1)}%</span>
                    </td>
                    <td className="px-3 py-2.5">
                      <button onClick={() => isEditing ? setEditDraft(null) : openEdit(i)} className={`text-xs font-semibold transition ${isEditing ? 'text-gray-400' : 'text-gray-400 hover:text-purple-600'}`}>
                        {isEditing ? 'Cancel' : 'Edit'}
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Inline edit panel */}
      {editDraft !== null && (
        <div className="mt-3 card p-5 border-2" style={{borderColor:'var(--purple)'}}>
          <div className="flex items-center justify-between mb-4">
            <p className="text-sm font-bold" style={{color:'var(--purple)'}}>Edit Levy — District {editDraft.num}: {editDraft.name}</p>
            {/* Live total */}
            <div className={`text-sm font-mono font-bold px-3 py-1 rounded-full ${draftOk ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
              Total: {draftTotal.toFixed(2)}% {draftOk ? '&#10003;' : '&#9888;'}
            </div>
          </div>

          {/* Fund inputs */}
          <div className="grid grid-cols-6 gap-3 mb-4">
            {FUND_FIELDS.map(f => (
              <div key={f.key}>
                <label className={`text-xs font-semibold ${f.col}`}>{f.label}</label>
                <input
                  className="w-full border rounded-lg px-3 py-1.5 text-sm mt-1 font-mono focus:outline-none focus:ring-2 focus:ring-purple-300"
                  type="number"
                  step="0.1"
                  min="0"
                  max="100"
                  value={editDraft[f.key]}
                  onChange={e => updateDraft(f.key, e.target.value)}
                />
              </div>
            ))}
          </div>

          {/* Board approval date */}
          <div className="mb-3">
            <label className="text-xs font-semibold text-gray-600">Board Approval Date <span className="text-red-500">*</span></label>
            <input
              type="date"
              className="block mt-1 border rounded-lg px-3 py-1.5 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-purple-300"
              value={boardDate}
              onChange={e => { setBoardDate(e.target.value); setValidationError(''); }}
            />
            <p className="text-xs text-gray-400 mt-1">Required — changes are immutable once saved with board date</p>
          </div>

          {/* Validation error */}
          {validationError && (
            <div className="mb-3 p-2.5 bg-red-50 border border-red-200 rounded-lg text-xs text-red-800 font-semibold">
              &#9888; {validationError}
            </div>
          )}

          <p className="text-xs text-amber-700 mb-3 bg-amber-50 p-2 rounded-lg">
            Changes logged with board approval date &middot; Effective from next TDF cycle &middot; Downstream: TDF Calculator + Tax Allocation Engine
          </p>

          <div className="flex gap-3">
            <button
              onClick={handleSave}
              className={`text-sm font-semibold px-5 py-2 rounded-lg text-white transition ${draftOk && boardDate ? 'bg-green-600 hover:bg-green-700' : 'bg-gray-300 cursor-not-allowed'}`}
            >
              &#128204; Save with Board Date
            </button>
            <button onClick={() => { setEditDraft(null); setValidationError(''); }} className="text-sm font-semibold px-4 py-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200">Cancel</button>
          </div>
        </div>
      )}

      <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl text-sm">
        <div className="font-semibold text-amber-800 mb-2">📝 Paul Clarifications Needed</div>
        <div className="text-amber-700 space-y-1 text-xs">
          <div>• Levy percentages in the prototype are proportional placeholders (Σ=100% per district). Before V1 launch, Hope needs to confirm the actual levy % for each fund type (Ed/O&amp;M/Debt Svc/Transport/Capital/Other) from Tyler Tech or board-approved levy ordinances. Which document is the authoritative source?</div>
          <div>• District count: TDF distributes to 17 districts, but the fund config shows 18 rows (including TTO). Should TTO be included in this config screen as a separate row, or removed? TTO does not receive TDF allocation — it is the aggregating entity.</div>
          <div>• Board approval requirement: when fund % allocations change (e.g., a district shifts levy), does that require a formal board resolution before Holicow updates? Or is Hope authorized to update without a vote?</div>
          <div>• Fund type labels: the prototype uses Education / O&amp;M / Debt Service / Transportation / Capital Projects / Other. Do these 6 labels match how Paul and Hope refer to the funds internally, or are there local naming conventions in Tyler Tech IV?</div>
        </div>
      </div>
      <div className="mt-3 flex items-center gap-4 pt-3 border-t border-gray-100">
        <button onClick={() => setActive('tdf')} className="text-xs font-semibold text-gray-500 hover:text-gray-800 hover:underline">💰 TDF Calculator →</button>
        <span className="text-gray-200">|</span>
        <button onClick={() => setActive('taxalloc')} className="text-xs font-semibold text-gray-500 hover:text-gray-800 hover:underline">🧾 Tax Allocation Engine →</button>
      </div>
    </div>
  );
}

      setActiveRaw(dest);

  // Redirect to dashboard if switching to Ops Manager and current screen is restricted
  React.useEffect(() => {
    if (role === 'ops' && !OPS_ALLOWED.has(active)) { activeRef.current = 'dashboard'; setPrevScreen(null); setActiveRaw('dashboard'); }
  }, [role]); // eslint-disable-line

  const screens = {
    search:            <Search setActive={setActive} />,
    'cash-register':   <CashRegister setActive={setActive} importedAccounts={importedAccounts} defaultAcct={lastImportedAcct} role={role} setInvestContext={setInvestContext} />,
    dashboard:         <Dashboard role={role} setActive={setActive} setInvestContext={setInvestContext} setImportedAccounts={setImportedAccounts} setLastImportedAcct={setLastImportedAcct} />,
    investable:        <InvestableCash setActive={setActive} role={role} />,
    maturities:        <MaturityCalendar setActive={setActive} role={role} setInvestContext={setInvestContext} />,
    portfolio:         <Portfolio setActive={setActive} investContext={investContext} setInvestContext={setInvestContext} role={role} />,
    blackbook:         <BlackBook setActive={setActive} role={role} />,
    uploads:           <UploadStatements setActive={setActive} role={role} />,
    boardreport:       <BoardReport setActive={setActive} tdfConfirmed={tdfConfirmed} setTdfConfirmed={setTdfConfirmed} />,
    forecast:          <Forecast setActive={setActive} investContext={investContext} role={role} />,
    compliance:        <ComplianceRules setActive={setActive} role={role} />,
    'ai-recs':         <AIRecommendations setActive={setActive} setInvestContext={setInvestContext} role={role} />,
    'new-investment':  <Portfolio setActive={setActive} investContext={investContext} setInvestContext={setInvestContext} defaultTab="new-investment" role={role} />,
    accrued:           <Portfolio setActive={setActive} investContext={investContext} setInvestContext={setInvestContext} defaultTab="accrued" role={role} />,
    'decision-log':    <DecisionLog setActive={setActive} role={role} />,
    monthclose:        <MonthEndClose setActive={setActive} />,
      districts:         <DistrictsOverview setActive={setActive} role={role} />,
    tdf:               <TDFCalculator setActive={setActive} />,
    taxalloc:          <TaxAllocation setActive={setActive} role={role} />,
    institutions:      <AuthorizedInstitutions setActive={setActive} />,
      settings:          <Settings setActive={setActive} />,
    'use-case-validation': <UseCaseValidation setActive={setActive} />,
    'je-export':           <JEExportTab setActive={setActive} />,
  };

  return (
    <NavCtx.Provider value={{ prevLabel: prevScreen ? (NAV_LABELS[prevScreen] || prevScreen) : null, back: goBack, prevScreen }}>
    <HelpCtx.Provider value={{ showHelp }}>
      <AnnotationsCtx.Provider value={annotationsOn}>
        {helpScreen && <HelpModal screenKey={helpScreen} onClose={closeHelp} />}
        <div className="flex h-screen overflow-hidden">
          <Sidebar active={active} setActive={setActive} role={role} mobileNavOpen={mobileNavOpen} setMobileNavOpen={setMobileNavOpen} />
          <div className="flex-1 flex flex-col overflow-hidden">
            <Header role={role} setRole={(r) => { setRole(r); activeRef.current = 'dashboard'; setPrevScreen(null); setActiveRaw('dashboard'); }} annotationsOn={annotationsOn} setAnnotationsOn={setAnnotationsOn} onSearchOpen={() => setActive('search')} onMenuOpen={() => setMobileNavOpen(true)} />
            <main className="flex-1 overflow-y-auto pb-16 md:pb-0">
              {screens[active] || <div className="p-6 text-gray-400">Screen not found</div>}
            </main>
          </div>
          <BottomNav active={active} setActive={setActive} role={role} />
        </div>
      </AnnotationsCtx.Provider>
    </HelpCtx.Provider>
    </NavCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
