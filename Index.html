              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// PLACEHOLDER: V1 source: per-district fund balances from Tyler Tech InfoLink Cash & Bank report (Fund Balance report, funds 10/20/30/40/50/60)
// These base amounts are PLACEHOLDER proportional multipliers × d.m factor — replace with actual InfoLink per-district per-fund data in V1
// Sarvika: GET /api/v1/districts/:did/fund-balances WHERE tenant_id=:tid AND close_period=:period → returns { f10, f20, f30, f40, f50, f60 } per district
const FUND_BASES = { f10: 7900000, f20: 2700000, f30: 5100000, f40: 1740000, f50: 2320000, f60: 1470000 };
function distFunds(d) {
  // PLACEHOLDER: V1 replaces this with direct DB lookup per district — no m-factor multiplication
  return {
    f10: Math.round(d.m * FUND_BASES.f10),
    f20: Math.round(d.m * FUND_BASES.f20),
    f30: Math.round(d.m * FUND_BASES.f30),
    f40: Math.round(d.m * FUND_BASES.f40),
    f50: Math.round(d.m * FUND_BASES.f50),
    f60: Math.round(d.m * FUND_BASES.f60),
  };
}
function distTotal(d) {
  // PLACEHOLDER: V1 source: SUM(fund_balances) per district from InfoLink report
  const f = distFunds(d);
  return Object.values(f).reduce((a, b) => a + b, 0);
}

const REINVEST_JE_QUEUE = [];
let _jeIdSeq = 100;
function pushReinvestJE(pos, opt) {
  const amtDollars = Math.round(pos.amount * 1000000);
  const matDate = pos.mat ? pos.mat.substring(5) : 'Jan 20';
  // Entry 1: Maturity receipt — #0936 receives principal back (auto-detected from bank upload)
  REINVEST_JE_QUEUE.push({
    id: _jeIdSeq++,
    date: matDate,
    source: 'Bank Upload',
    module: 'maturities',
    dr: 'Cash — Republic Invest (#0936)',
    cr: 'Investment — ' + pos.institution + ' (Matured ' + pos.mat + ')',
    amount: amtDollars,
    fund: 'All Funds (TDF)',
    status: 'matched',
    note: 'CD / bond maturity — principal returned to #0936 clearing account',
  });
  if (opt.label.includes('Hold')) return;
  // Entry 2: Reinvestment deployment — #0936 sends proceeds to new destination
  let dr2, note2;
  if (opt.label.includes('Renew')) {
    dr2 = 'Investment — ' + pos.institution + ' (Renewal CD)';
    note2 = 'Rollover at maturity · ' + pos.mat + ' · market rate';
  } else if (opt.label.includes('ILF')) {
    dr2 = 'Investment — Illinois Funds (ILF)';
    note2 = 'Maturity proceeds deployed to ILF @ ' + opt.rate;
  } else {
    dr2 = 'Investment — New CD (pending trade ticket · FHB-DTC)';
    note2 = 'New CD via FHB-DTC · ' + opt.term + ' · complete trade ticket in New Investment';
  }
  REINVEST_JE_QUEUE.push({
    id: _jeIdSeq++,
    date: matDate,
    source: 'Holicow',
    module: 'maturities',
    dr: dr2,
    cr: 'Cash — Republic Invest (#0936)',
    amount: amtDollars,
    fund: 'All Funds (TDF)',
    status: 'pending',
    note: note2,
  });
}

    padding: '6px 16px', borderRadius: 20, border: 'none', cursor: 'pointer', fontSize: 13,

  return (
    <div>

}

function InvestmentPortfolioTab({ setActive, setInvestContext }) {
  // ─── COMPUTED PORTFOLIO METRICS ──────────────────────────────────────────────
  const isLiquidType = (t) => ['Public Fund NOW','Clearing Hub','Pool','Gov MM'].includes(t);
  const termPositions = DEC25.investments.filter(inv => !isLiquidType(inv.type));
  const liquidPositions = DEC25.investments.filter(inv => isLiquidType(inv.type));

// enrichTxns(institutionId, txns) — classifies each transaction for interest enrichment review
// Returns txns array with added enrichClass ('green'/'amber'/'red'), enrichNote, enrichAction fields
// PLACEHOLDER: V1 source = POST /api/v1/statements/:id/enrich (runs after parse, before review step)
function enrichTxns(institutionName, txns) {
  if (!txns || !txns.length) return txns;
  // Check GREEN institutions first
  const greenMatch = INT_ENRICHMENT_CLASSES.green.institutions[institutionName];
  if (greenMatch) {
    return txns.map(t => {
      const isInterest = t.credit && (
        /interest|coupon|dividend|accrual/i.test(t.desc) ||
        (greenMatch.expectedAmt && Math.abs(t.credit - greenMatch.expectedAmt) <= greenMatch.tolerance)
      );
      if (isInterest) {
        return { ...t, enrichClass: 'green', enrichNote: greenMatch.note, enrichAction: 'Auto-confirmed \u2014 will route to Interest Received Tab 3 on accept' };
      }
      return { ...t, enrichClass: null, enrichNote: null, enrichAction: null };
    });
  }
  // Check AMBER institutions
  const amberMatch = INT_ENRICHMENT_CLASSES.amber.institutions[institutionName];
  if (amberMatch) {
    return txns.map(t => {
      const isInterest = t.credit && /interest|coupon|dividend|accrual|paydown/i.test(t.desc);
      if (isInterest) {
        return { ...t, enrichClass: 'amber', enrichNote: amberMatch.note, enrichAction: 'Verify amount \u2014 confirm or flag for review' };
      }
      return { ...t, enrichClass: null, enrichNote: null, enrichAction: null };
    });
  }
  // RED fallback — unknown institution or no pattern match
  return txns.map(t => {
    const isInterest = t.credit && /interest|coupon|dividend|accrual/i.test(t.desc);
    if (isInterest) {
      return { ...t, enrichClass: 'red', enrichNote: 'Unmatched institution \u2014 classify manually', enrichAction: 'Classify: Interest Income / Bank Fee / Transfer / Other' };
    }
    return { ...t, enrichClass: null, enrichNote: null, enrichAction: null };
  });
}

        const [enrichmentResolved, setEnrichmentResolved] = React.useState({});

        const cfg  = activeFlow ? UPLOAD_CONFIG[activeFlow] : null;
        const extr = activeFlow ? (MOCK_EXTRACTED[activeFlow] || null) : null;

        const startFlow = (name) => {
          setActiveFlow(name);
          setFlowStep(1);
          setParseStage(0);
          setReviewTab('transactions');
          setResolvedFlags({});
          setEnrichmentResolved({});
        };
        const closeFlow = () => { setActiveFlow(null); setFlowStep(0); setEnrichmentResolved({}); };

        const runParse = () => {
          setFlowStep(2);
          setParseStage(0);
          let stage = 0;
          const tick = () => {
            stage++;
            setParseStage(stage);
            if (stage < PARSER_STAGES.length - 1) setTimeout(tick, 600);
            else setTimeout(() => { setFlowStep(3); setReviewTab('transactions'); }, 700);
          };
          setTimeout(tick, 500);
        };

        const acceptStatement = () => {
          setUploadStates(prev => ({...prev, [activeFlow]: 'uploaded'}));
          const cfg = UPLOAD_CONFIG[activeFlow];
          if (cfg && cfg.id) UPLOAD_ACCEPTED.add(cfg.id);
          setFlowStep(4);
        };

        const flaggedTxns = extr ? extr.txns.filter(t => t.flag) : [];
        const unresolvedFlags = flaggedTxns.filter(t => !resolvedFlags[t.desc]);
        // US-3: Enrichment classification helpers — partition txns into GREEN/AMBER/RED
        const enrichedTxns = extr ? extr.txns.filter(t => t.enrichClass) : [];
        const greenTxns  = enrichedTxns.filter(t => t.enrichClass === 'green');
        const amberTxns  = enrichedTxns.filter(t => t.enrichClass === 'amber');
        const redTxns    = enrichedTxns.filter(t => t.enrichClass === 'red');
        const unresolvedEnrichment = [...amberTxns, ...redTxns].filter(t => !enrichmentResolved[t.desc]);
        const configuredCount = INST_LIST.filter(n => UPLOAD_CONFIG[n].parserStatus === 'configured').length;
        const uploadedCount   = Object.values(uploadStates).filter(s => s === 'uploaded').length;
        const totalFlagged    = INST_LIST.reduce((s,n) => s + (UPLOAD_CONFIG[n].flagged||0), 0);
        const confInsts = INST_LIST.filter(n => UPLOAD_CONFIG[n].parserConf > 0);
        const avgConf   = confInsts.length > 0 ? Math.round(confInsts.reduce((s,n) => s + UPLOAD_CONFIG[n].parserConf, 0) / confInsts.length) : 0;

        const confColor = (c) => c >= 90 ? 'text-green-700' : c >= 75 ? 'text-amber-800' : 'text-red-600';
        const confBg    = (c) => c >= 90 ? 'bg-green-50 border-green-200' : c >= 75 ? 'bg-amber-50 border-amber-200' : 'bg-red-50 border-red-200';
        const statusBadge = (ps) => {
          if (ps==='configured') return <span className="text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700 font-medium">✓ Configured</span>;
          if (ps==='learning')   return <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-medium">⟳ Learning</span>;
          if (ps==='matured')    return <span className="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-400 font-medium">Matured</span>;
          return <span className="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 font-medium">○ Not Set Up</span>;
        };

        return (
          <div className="p-6 max-w-5xl mx-auto">
            {/* Header */}
            <div className="flex items-start justify-between mb-6">
              <div>
                <h2 className="text-xl font-semibold text-gray-900">Upload Statements</h2>
                <p className="text-sm text-gray-500 mt-1">Upload monthly investment custodian statements — Claude AI extracts transactions, verifies math, and routes to Cash Register</p>
              </div>
              <button onClick={()=>setActive('institutions')} className="text-xs px-3 py-1.5 rounded bg-purple-50 text-purple-700 border border-purple-200 hover:bg-purple-100">⚙ Manage Parser Config →</button>
            </div>

            {/* Republic Bank CSV note */}
            <div className="bg-blue-50 border border-blue-200 rounded-lg px-4 py-3 mb-5 text-sm text-blue-800">
              <span className="font-semibold">🏦 Republic Bank ({UPLOAD_ACCOUNTS.filter(a => a.uploadType === 'csv-daily').map(a => a.acct).join(' / ')})</span> — daily CSV uploads are handled via the <strong>Dashboard → Daily Activity</strong> upload flow, not this screen. This screen is for <strong>monthly investment custodian PDF statements</strong> only.
            </div>

            {/* Summary cards */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
              {[
                {label:'Uploaded ' + CLOSE_MONTH, val:`${uploadedCount} / ${INST_LIST.length}`, sub:'institutions', color:'text-green-700'},
                {label:'Parsers Configured', val:`${configuredCount}`, sub:'of '+INST_LIST.length+' institutions', color:'text-blue-700'},
                {label:'Avg Confidence', val:avgConf+'%', sub:'last parse run', color:'text-purple-700'},
                {label:'Flagged for Review', val:`${totalFlagged}`, sub:totalFlagged === 1 ? 'item across all uploads' : 'items across all uploads', color:'text-amber-800'},
              ].map((m,i)=>(
                <div key={i} className="bg-white border border-gray-200 rounded-lg p-4">
                  <div className="text-xs text-gray-500 mb-1">{m.label}</div>
                  <div className={`text-2xl font-bold ${m.color}`}>{m.val}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{m.sub}</div>
                </div>
              ))}
            </div>

            {/* ACTIVE UPLOAD FLOW */}
            {activeFlow && (
              <div className="bg-white border-2 border-purple-200 rounded-xl mb-6 overflow-hidden shadow-sm">
                {/* Flow header */}
                <div className="bg-purple-600 px-5 py-3 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <span className="text-white font-semibold">{activeFlow}</span>
                    <span className="text-purple-200 text-sm">·  {cfg && cfg.acctNum}</span>
                    {cfg && statusBadge(cfg.parserStatus)}
                  </div>
                  <button onClick={closeFlow} className="text-purple-200 hover:text-white text-sm">✕ Close</button>
                </div>

                {/* Step 1: File selected / ready to parse */}
                {flowStep === 1 && (
                  <div className="p-5">
                    <div className="flex gap-4 items-start">
                      <div className="flex-1">
                        <div className="text-sm font-medium text-gray-700 mb-2">Ready to parse</div>
                        <div className="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-3">
                          <div className="flex items-center gap-3">
                            <span className="text-2xl">📄</span>
                            <div>
                              <div className="text-sm font-medium text-gray-800">statement_{activeFlow.replace(/[^a-z0-9]/gi,'_').toLowerCase()}_{CLOSE_MONTH_ABBR.toLowerCase()}{CLOSE_MONTH.slice(-4)}.pdf</div>
                              <div className="text-xs text-gray-400 mt-0.5">{cfg && cfg.format}</div>
                            </div>
                            <div className="ml-auto">
                              <span className="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full">✓ File ready</span>
                            </div>
                          </div>
                        </div>
                        {cfg && cfg.parserStatus !== 'not-setup' && (
                          <div className="text-xs text-gray-500 bg-blue-50 border border-blue-100 rounded p-3 mb-3">
                            🤖 <strong>Parser template loaded</strong> — {cfg.lastTxns} transactions extracted on last run ({cfg.lastUpload}) · Confidence {cfg.parserConf}%
                          </div>
                        )}
                        {cfg && cfg.parserStatus === 'not-setup' && (
                          <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded p-3 mb-3">
                            ○ <strong>First upload — Claude will learn the format</strong> — No prior template. Claude will analyze this statement structure and save a parser template for future runs.
                          </div>
                        )}
                        <button onClick={runParse} className="bg-purple-600 text-white text-sm px-5 py-2 rounded-lg hover:bg-purple-700 font-medium">
                          🤖 Run AI Parser →
                        </button>
                        <button onClick={closeFlow} className="ml-3 text-gray-500 text-sm px-4 py-2 rounded-lg border border-gray-200 hover:bg-gray-50">Cancel</button>
                      </div>
                      <div className="text-xs text-gray-500 bg-gray-50 border border-gray-200 rounded p-3 w-56">
                        <div className="font-medium text-gray-700 mb-2">Where to get this statement</div>
                        <div className="leading-relaxed">{cfg && cfg.uploadNote}</div>
                        <div className="mt-2 pt-2 border-t border-gray-200">
                          <span className="text-gray-500">Routes to: </span>
                          <span className="font-medium text-gray-700">{cfg && cfg.cashRegAcct}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Step 2: Parsing animation */}
                {flowStep === 2 && (
                  <div className="p-5">
                    <div className="text-sm font-medium text-gray-700 mb-4">Claude AI is parsing your statement…</div>
                    <div className="space-y-2">
                      {PARSER_STAGES.map((stage, idx) => {
                        const done    = idx < parseStage;
                        const current = idx === parseStage;
                        return (
                          <div key={idx} className={`flex items-center gap-3 px-4 py-2.5 rounded-lg border text-sm transition-all ${done ? 'bg-green-50 border-green-200 text-green-700' : current ? 'bg-purple-50 border-purple-300 text-purple-800' : 'bg-gray-50 border-gray-100 text-gray-400'}`}>
                            <span>{done ? '✓' : current ? '⟳' : '○'}</span>
                            <span className="flex-1">{stage.icon} {stage.label}</span>
                            {done && <span className="text-xs font-medium">done</span>}
                            {current && <span className="text-xs font-medium animate-pulse">running…</span>}
                            <div className="w-24 h-1.5 rounded-full bg-gray-200 overflow-hidden">
                              <div className={`h-full rounded-full transition-all ${done||current ? 'bg-purple-500' : 'bg-gray-200'}`} style={{width:(done||current)?stage.pct+'%':'0%'}}></div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Step 3: Review */}
                {flowStep === 3 && extr && (
                  <div className="p-5">
                    {/* Review header */}
                    <div className="flex items-center gap-4 mb-4">
                      <div className="flex gap-2 flex-wrap">
                        {['transactions','exceptions','enrichment','math'].map(tab => (
                          <button key={tab} onClick={()=>setReviewTab(tab)}
                            className={`text-xs px-3 py-1.5 rounded-full font-medium capitalize border ${reviewTab===tab ? 'bg-purple-600 text-white border-purple-600' : 'bg-white text-gray-600 border-gray-200 hover:border-purple-300'}`}>
                            {tab === 'exceptions' ? `Flagged (${unresolvedFlags.length} unresolved)` : tab === 'math' ? `Math Check ${extr.mathCheck ? '✓' : '⚠️'}` : tab === 'enrichment' ? `Interest (${unresolvedEnrichment.length > 0 ? unresolvedEnrichment.length + ' pending' : '✓'})` : 'Transactions'}
                          </button>
                        ))}
                      </div>
                      <div className="ml-auto text-xs text-gray-500">{extr.txns.length} transactions extracted · <span className="text-purple-700 font-medium">{cfg && cfg.parserConf}% avg confidence</span></div>
                    </div>

                    {/* Transactions tab */}
                    {reviewTab === 'transactions' && (
                      <div className="border border-gray-200 rounded-lg overflow-hidden">
                        <table className="w-full text-xs">
                          <thead><tr className="bg-gray-50 border-b border-gray-200">
                            <th className="text-left px-3 py-2 text-gray-500 font-medium">Date</th>
                            <th className="text-left px-3 py-2 text-gray-500 font-medium">Description</th>
                            <th className="text-right px-3 py-2 text-gray-500 font-medium">Outflow</th>
                            <th className="text-right px-3 py-2 text-gray-500 font-medium">Inflow</th>
                            <th className="text-center px-3 py-2 text-gray-500 font-medium">Confidence</th>
                            <th className="px-3 py-2"></th>
                          </tr></thead>
                          <tbody>
                            {extr.txns.map((t, idx) => (
                              <tr key={idx} className={`border-b border-gray-100 ${t.flag && !resolvedFlags[t.desc] ? 'bg-amber-50' : ''}`}>
                                <td className="px-3 py-2 text-gray-600">{t.date}</td>
                                <td className="px-3 py-2 text-gray-800 font-medium">{t.desc}</td>
                                <td className="px-3 py-2 text-right text-red-600">{t.debit ? '$'+t.debit.toLocaleString('en-US',{minimumFractionDigits:2}) : '—'}</td>
                                <td className="px-3 py-2 text-right text-green-700">{t.credit ? '$'+t.credit.toLocaleString('en-US',{minimumFractionDigits:2}) : '—'}</td>
                                <td className="px-3 py-2 text-center">
                                  <span className={`inline-block px-2 py-0.5 rounded-full text-xs font-medium border ${confBg(t.conf)} ${confColor(t.conf)}`}>{t.conf}%</span>
                                </td>
                                <td className="px-3 py-2">
                                  {t.flag && !resolvedFlags[t.desc] && (
                                    <span className="text-amber-600 text-xs">⚠ flagged</span>
                                  )}
                                  {resolvedFlags[t.desc] && (
                                    <span className="text-green-600 text-xs">✓ resolved</span>
                                  )}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {/* Exceptions tab */}
                    {reviewTab === 'exceptions' && (
                      <div className="space-y-3">
                        {flaggedTxns.length === 0 && (
                          <div className="text-center py-8 text-gray-400">✓ No flagged items — all transactions extracted with high confidence</div>
                        )}
                        {flaggedTxns.map((t, idx) => (
                          <div key={idx} className={`border rounded-lg p-4 ${resolvedFlags[t.desc] ? 'border-green-200 bg-green-50' : 'border-amber-200 bg-amber-50'}`}>
                            <div className="flex items-start justify-between mb-2">
                              <div>
                                <div className="text-sm font-medium text-gray-800">{t.desc}</div>
                                <div className="text-xs text-gray-500 mt-0.5">{t.date} · {t.debit ? 'Outflow $'+t.debit.toLocaleString() : 'Inflow $'+t.credit.toLocaleString()} · Confidence <span className={confColor(t.conf)}>{t.conf}%</span></div>
                              </div>
                              {resolvedFlags[t.desc] ? (
                                <span className="text-xs text-green-700 font-medium">✓ {resolvedFlags[t.desc]}</span>
                              ) : (
                                <span className="text-xs px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full font-medium">Needs review</span>
                              )}
                            </div>
                            <div className="text-xs text-gray-600 mb-3 italic">{t.flagReason}</div>
                            {!resolvedFlags[t.desc] && (
                              <div className="flex flex-wrap gap-2">
                                <button onClick={()=>setResolvedFlags(p=>({...p,[t.desc]:'Accepted as-is'}))} className="text-xs px-3 py-1 bg-white border border-gray-300 rounded hover:border-green-400 text-gray-700">Accept as-is</button>
                                <button onClick={()=>setResolvedFlags(p=>({...p,[t.desc]:'Corrected & parser trained'}))} className="text-xs px-3 py-1 bg-white border border-gray-300 rounded hover:border-blue-400 text-gray-700">✏ Correct &amp; train parser</button>
                                <button onClick={()=>setResolvedFlags(p=>({...p,[t.desc]:'Marked for manual review'}))} className="text-xs px-3 py-1 bg-white border border-gray-300 rounded hover:border-amber-400 text-gray-700">Mark for manual review</button>
                                <button onClick={()=>setResolvedFlags(p=>({...p,[t.desc]:'Cash Register adjustment created'}))} className="text-xs px-3 py-1 bg-white border border-gray-300 rounded hover:border-purple-400 text-gray-700">Create Cash Register adjustment</button>
                              </div>
                            )}
                          </div>
                        ))}
                        {flaggedTxns.length > 0 && unresolvedFlags.length === 0 && (
                          <div className="text-center py-3 text-green-700 text-sm font-medium">✓ All exceptions resolved — ready to accept</div>
                        )}
                      </div>
                    )}

                    {/* Math verification tab */}
                    {reviewTab === 'math' && (
                      <div className="space-y-4">
                        <div className={`border rounded-lg p-4 ${extr.mathCheck ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50'}`}>
                          <div className="text-sm font-semibold text-gray-800 mb-3">Balance Verification</div>
                          <div className="font-mono text-sm space-y-1.5">
                            <div className="flex justify-between"><span className="text-gray-600">Opening balance</span><span className="text-gray-800">${extr.openBal.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
                            <div className="flex justify-between"><span className="text-gray-600">+ Total credits (inflows)</span><span className="text-green-700">+ ${extr.credits.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
                            <div className="flex justify-between"><span className="text-gray-600">- Total debits (outflows)</span><span className="text-red-600">- ${extr.debits.toLocaleString('en-US',{minimumFractionDigits:2})}</span></div>
                            <div className="border-t border-gray-300 pt-1.5 flex justify-between font-semibold">
                              <span className="text-gray-700">Calculated closing</span>
                              <span className="text-gray-800">${(extr.openBal + extr.credits - extr.debits).toLocaleString('en-US',{minimumFractionDigits:2})}</span>
                            </div>
                            <div className="flex justify-between">
                              <span className="text-gray-600">Statement closing</span>
                              <span className="text-gray-800">${extr.closeBal.toLocaleString('en-US',{minimumFractionDigits:2})}</span>
                            </div>
                            <div className={`flex justify-between font-bold text-base pt-1 border-t ${extr.mathCheck ? 'border-green-300 text-green-700' : 'border-red-300 text-red-600'}`}>
                              <span>Variance</span>
                              <span>{extr.mathCheck ? '✓ $0.00 — Balanced' : '⚠ $'+(Math.abs(extr.openBal+extr.credits-extr.debits-extr.closeBal)).toLocaleString('en-US',{minimumFractionDigits:2})+' — Review needed'}</span>
                            </div>
                          </div>
                        </div>
                        <div className="text-xs text-gray-500 bg-gray-50 border border-gray-200 rounded p-3">
                          <strong>How math verification works:</strong> After extracting all transactions, Claude recalculates the closing balance from scratch. If it matches the statement closing balance (within $0.01), the parse is verified. If not, the flagged rows are highlighted for review. Corrections are saved as few-shot examples to improve future parsing accuracy.
                        </div>
                      </div>
                    )}

                    {/* US-3: Interest enrichment review tab — classifies interest transactions for routing */}
                    {/* V1: enrichment classes computed by enrichTxns() from INT_ENRICHMENT_CLASSES */}
                    {reviewTab === 'enrichment' && (
                      <div className="space-y-4">
                        {enrichedTxns.length === 0 ? (
                          <div className="text-center py-8 text-gray-400">No interest transactions detected for this institution</div>
                        ) : (
                          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {/* GREEN column — auto-confirmed */}
                            <div className="border border-green-200 rounded-lg bg-green-50/50">
                              <div className="px-3 py-2 border-b border-green-200 bg-green-100/50 rounded-t-lg">
                                <div className="text-xs font-semibold text-green-800">✅ Auto-Confirmed ({greenTxns.length})</div>
                                <div className="text-xs text-green-600 mt-0.5">Routes to Interest Received on accept</div>
                              </div>
                              <div className="p-2 space-y-2">
                                {greenTxns.length === 0 && <div className="text-xs text-gray-400 text-center py-3">None</div>}
                                {greenTxns.map((t, i) => (
                                  <div key={i} className="bg-white rounded p-2 border border-green-100">
                                    <div className="text-xs font-medium text-gray-800 truncate">{t.desc}</div>
                                    <div className="text-xs text-green-700 font-semibold mt-0.5">{t.credit ? '+$'+t.credit.toLocaleString('en-US',{minimumFractionDigits:2}) : t.debit ? '-$'+t.debit.toLocaleString('en-US',{minimumFractionDigits:2}) : ''}</div>
                                    <div className="text-xs text-gray-500 mt-0.5 italic">{t.enrichNote}</div>
                                  </div>
                                ))}
                              </div>
                            </div>
                            {/* AMBER column — needs verification */}
                            <div className="border border-amber-200 rounded-lg bg-amber-50/50">
                              <div className="px-3 py-2 border-b border-amber-200 bg-amber-100/50 rounded-t-lg">
                                <div className="text-xs font-semibold text-amber-800">⚠️ Needs Verification ({amberTxns.length})</div>
                                <div className="text-xs text-amber-600 mt-0.5">Confirm amount or allocation before routing</div>
                              </div>
                              <div className="p-2 space-y-2">
                                {amberTxns.length === 0 && <div className="text-xs text-gray-400 text-center py-3">None</div>}
                                {amberTxns.map((t, i) => (
                                  <div key={i} className={`rounded p-2 border ${enrichmentResolved[t.desc] ? 'bg-green-50 border-green-200' : 'bg-white border-amber-100'}`}>
                                    <div className="text-xs font-medium text-gray-800 truncate">{t.desc}</div>
                                    <div className="text-xs text-amber-700 font-semibold mt-0.5">{t.credit ? '+$'+t.credit.toLocaleString('en-US',{minimumFractionDigits:2}) : t.debit ? '-$'+t.debit.toLocaleString('en-US',{minimumFractionDigits:2}) : ''}</div>
                                    <div className="text-xs text-gray-500 mt-0.5 italic">{t.enrichNote}</div>
                                    {enrichmentResolved[t.desc] ? (
                                      <div className="flex items-center gap-2 mt-2">
                                        <span className="text-xs text-green-700 font-medium">✓ {enrichmentResolved[t.desc]}</span>
                                        <button onClick={()=>setEnrichmentResolved(p=>{const n={...p}; delete n[t.desc]; return n;})} className="text-xs text-gray-400 hover:text-gray-600 underline">Undo</button>
                                      </div>
                                    ) : (
                                      <div className="flex gap-1.5 mt-2">
                                        <button onClick={()=>setEnrichmentResolved(p=>({...p,[t.desc]:'Confirmed'}))} className="text-xs px-2 py-1 bg-green-600 text-white rounded hover:bg-green-700">Confirm</button>
                                        <button onClick={()=>setEnrichmentResolved(p=>({...p,[t.desc]:'Flagged for review'}))} className="text-xs px-2 py-1 bg-white border border-amber-300 text-amber-700 rounded hover:bg-amber-50">Flag</button>
                                      </div>
                                    )}
                                  </div>
                                ))}
                              </div>
                            </div>
                            {/* RED column — unmatched/unknown */}
                            <div className="border border-red-200 rounded-lg bg-red-50/50">
                              <div className="px-3 py-2 border-b border-red-200 bg-red-100/50 rounded-t-lg">
                                <div className="text-xs font-semibold text-red-800">❓ Needs Classification ({redTxns.length})</div>
                                <div className="text-xs text-red-600 mt-0.5">Classify before routing to Interest Received</div>
                              </div>
                              <div className="p-2 space-y-2">
                                {redTxns.length === 0 && <div className="text-xs text-gray-400 text-center py-3">None</div>}
                                {redTxns.map((t, i) => (
                                  <div key={i} className={`rounded p-2 border ${enrichmentResolved[t.desc] ? 'bg-green-50 border-green-200' : 'bg-white border-red-100'}`}>
                                    <div className="text-xs font-medium text-gray-800 truncate">{t.desc}</div>
                                    <div className="text-xs text-red-700 font-semibold mt-0.5">{t.credit ? '+$'+t.credit.toLocaleString('en-US',{minimumFractionDigits:2}) : t.debit ? '-$'+t.debit.toLocaleString('en-US',{minimumFractionDigits:2}) : ''}</div>
                                    <div className="text-xs text-gray-500 mt-0.5 italic">{t.enrichNote}</div>
                                    {enrichmentResolved[t.desc] ? (
                                      <div className="flex items-center gap-2 mt-2">

//   district_fund_config (fund balance shares per district from Cash & Bank InfoLink),

// ─────────────────────────────────────────────
// TAX ALLOCATION ENGINE
// PLACEHOLDER: V1 API source — POST /api/v1/tax-allocation/calculate (body: {amount, install_date, fiscal_year, cc_ref_num})
// → computes allocation from: county_tax_installments + DISTRICTS_INIT fund splits (district_fund_config table)
// + Cook County EAV proportions (county_levy_data.eav WHERE district_id IN tenant districts)
// GET /api/v1/tax-allocation/export → generates CSV for Tyler Tech JE import
// DB tables: county_tax_installments (amount/date/ref), tax_allocation_runs (audit), tax_allocation_line_items (per-district per-fund)
// ─────────────────────────────────────────────
function TaxAllocation({ setActive, role }) {
  // PLACEHOLDER: V1 default amount from county_tax_installments.estimated_amount or last installment
  const TYPICAL_SPRING_INSTALLMENT = 53200000; // est. Cook County first installment (spring) — confirm with Paul
  const FUND_TYPE_COUNT = 6; // F10 Ed, F20 O&M, F30 Debt, F40 Trans, F50 IMRF, F60 Cap
  // PLACEHOLDER: V1 fallback fund splits from system_parameters or district_fund_config defaults
  const FALLBACK_FUND_SPLITS = { f10:0.39, f20:0.133, f30:0.251, f40:0.086, f50:0.114, f60:0.026 };

  const [amount, setAmount] = React.useState(TYPICAL_SPRING_INSTALLMENT);
  const [generated, setGenerated] = React.useState(false);
  const [exported, setExported] = React.useState(false);
  const [ccRefNum, setCcRefNum] = React.useState('');
  const [installDate, setInstallDate] = React.useState('2026-03-29');
  const [fiscalYear, setFiscalYear] = React.useState('FY2025');
  const { showHelp } = React.useContext(HelpCtx);

  // JE year suffix — Program segment of Tyler Tech 8-segment GL format
  // 1111=FY2025 (current year) · 1112=FY2024 · 1113=FY2023 · confirmed Apr 1, 2026
  const yearSuffix = fiscalYear === 'FY2025' ? '1111' : fiscalYear === 'FY2024' ? '1112' : '1113';

  const totalEAV = DEC25.districts.reduce((s, d) => s + d.eav, 0);

  // Per-district fund splits: board-approved levy % from DISTRICTS_INIT (District & Fund Config screen)
  // Key mapping: ed→F10 Ed, om→F20 O&M, ds→F30 Debt, tr→F40 Trans, cap→F50 IMRF, other→F60 Capital
  const districtFundMap = Object.fromEntries(
    DISTRICTS_INIT.map(function(di){ return [di.num, { f10:di.ed/100, f20:di.om/100, f30:di.ds/100, f40:di.tr/100, f50:di.cap/100, f60:di.other/100 }]; })
  );

  const alloc = DEC25.districts.map(function(d) {
    const distNum = d.id.replace('D','');
    const fp = districtFundMap[distNum] || FALLBACK_FUND_SPLITS;
    const tot = Math.round(d.eav / totalEAV * amount);
    return {
      ...d,
      pct: d.eav / totalEAV,
      distAmount: tot,
      f10: Math.round(tot * fp.f10),
      f20: Math.round(tot * fp.f20),
      f30: Math.round(tot * fp.f30),
      f40: Math.round(tot * fp.f40),
      f50: Math.round(tot * fp.f50),
      f60: Math.round(tot * fp.f60),
    };
  });

  const totals = {
    distAmount: alloc.reduce((s,d)=>s+d.distAmount,0),
    f10: alloc.reduce((s,d)=>s+d.f10,0),
    f20: alloc.reduce((s,d)=>s+d.f20,0),
    f30: alloc.reduce((s,d)=>s+d.f30,0),
    f40: alloc.reduce((s,d)=>s+d.f40,0),
    f50: alloc.reduce((s,d)=>s+d.f50,0),
    f60: alloc.reduce((s,d)=>s+d.f60,0),
  };

  // sampleJEs uses confirmed 8-segment format: Fund.Type.Account.DebtService.Object.Source.Program.School
  // Program segment = yearSuffix (1111/1112/1113 per fiscal year); specific segment values to be confirmed with Paul
  const sampleJEs = alloc.slice(0, 3).flatMap(d => [
    { acct: `10.1.0120.000.2300.000.${yearSuffix}.0000`, desc: `DR Tax Receivable — ${d.short} Fund 10 (Education)`,    debit: d.f10, credit: 0       },
    { acct: `10.4.0000.000.4000.000.${yearSuffix}.0000`, desc: `CR Tax Revenue — ${d.short} Fund 10 (Education)`,       debit: 0,     credit: d.f10  },
  ]);

  // Dynamic JE counts — alloc.length districts × FUND_TYPE_COUNT fund types
  const jePairs = alloc.length * FUND_TYPE_COUNT;
  const jeLines = jePairs * 2; // each pair = 1 DR + 1 CR GL line
  // PLACEHOLDER: V1 rounding residual — Math.round per district + per fund can produce residual
  // Paul confirmed: residual assigned to D87 Berkeley SD 87 as separate correction row (per 87 JE Tax file)
  // V1: residual = amount - totals.distAmount → if ≠ 0, append adjustment row for D87
  const roundingResidual = amount - totals.distAmount;
  const allocPctTotal = totals.distAmount / amount * 100;

  // Dynamic installment label from date input
  const installMonthLabel = (function() {
    try {
      const d = new Date(installDate + 'T00:00:00');
      const m = d.toLocaleString('en-US', { month: 'long' });
      return m + ' ' + d.getFullYear() + ' Installment';
    } catch(e) { return 'Tax Installment'; }
  })();
  const installMonthAbbr = (function() {
    try { return new Date(installDate + 'T00:00:00').toLocaleString('en-US', { month: 'short' }).toUpperCase(); }
    catch(e) { return 'TAX'; }
  })();
  const exportFilename = 'TAX_ALLOC_' + installMonthAbbr + installDate.slice(0,4) + '.csv';
  const levyLabel = 'Levy table ' + fiscalYear.replace('FY','v');

  return (
    <div className="p-6 max-w-5xl mx-auto space-y-6">
      <SectionHeader title="Tax Allocation Engine" sub={'Cook County property tax installment \u2192 ' + alloc.length + ' districts \u00d7 ' + FUND_TYPE_COUNT + ' fund types \u2192 Tyler Tech JEs'} badge={installMonthLabel} helpScreen="taxalloc" section="QUARTERLY" />

      {DEC25.districts.length === 0 ? (
        <div className="bg-gray-50 border border-gray-200 rounded-xl p-8 text-center">
          <div className="text-4xl mb-3">🧾</div>
          <div className="font-semibold text-gray-700 mb-1">No Districts Configured</div>
          <div className="text-sm text-gray-500 mb-3">Add districts in the District &amp; Fund Config screen before running tax allocation.</div>
          {role !== 'ops' && <button onClick={() => setActive('settings')} className="text-xs font-semibold text-purple-600 hover:underline">Configure Districts →</button>}
        </div>
      ) : (<>

      <div className="bg-purple-50 border border-purple-200 rounded-xl p-4">
        <div className="text-sm font-semibold text-purple-800 mb-1">⚠️ Current Reality</div>
        <div className="text-sm text-purple-700">Staff manually splits each Cook County installment across {alloc.length} districts × {FUND_TYPE_COUNT} fund types in Excel using printed levy tables. One full day per installment, twice a year. Error-prone rounding, no audit trail.</div>
      </div>

      <div className="bg-green-50 border border-green-200 rounded-xl p-3 text-xs text-green-800">
        <span className="font-bold">✅ Live data:</span> Each district's share is calculated from Cook County EAV (entered at setup from the distribution table). Fund splits use board-approved levy percentages from the District &amp; Fund Config screen — not a global average. {alloc.length} districts × {FUND_TYPE_COUNT} fund types.
      </div>
      <div className="bg-white border border-gray-200 rounded-xl p-5">
        <div className="font-semibold text-gray-800 mb-4">Cook County Installment Amount</div>
        <div className="flex items-center gap-4 flex-wrap">
          <div className="relative">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 font-medium">$</span>
            <input
              type="number"
              value={amount}
              onChange={e => { setAmount(Number(e.target.value)); setGenerated(false); setExported(false); }}
              className="border border-gray-300 rounded-lg pl-7 pr-4 py-2.5 text-right font-mono text-lg w-56 focus:outline-none focus:ring-2 focus:ring-purple-400"
            />
          </div>
          <div className="text-sm text-gray-500">Cook County first installment (spring) <span className="font-medium text-gray-700">· est. ${(TYPICAL_SPRING_INSTALLMENT/1e6).toFixed(0)}M typical</span></div>
        </div>
        <div className="flex items-center gap-4 flex-wrap mt-3">
          <div>
            <label className="block text-xs font-semibold text-gray-500 mb-1">Cook County Reference # <span className="font-normal text-gray-400">(optional)</span></label>
            <input type="text" value={ccRefNum} onChange={e => setCcRefNum(e.target.value)} placeholder="From remittance notice, if provided" className="border border-gray-300 rounded-lg px-3 py-2 text-sm w-52 font-mono focus:outline-none focus:ring-2 focus:ring-purple-400" />
            <div className="text-xs text-gray-400 mt-0.5">From Cook County distribution memo — if provided</div>
          </div>
          <div>
            <label className="block text-xs font-semibold text-gray-500 mb-1">Distribution Date</label>
            <input type="date" value={installDate} onChange={e => setInstallDate(e.target.value)} className="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400" />
          </div>
          <div className="self-end text-xs text-gray-400 italic">(2nd installment: Dec 29–30)</div>
          <button
            onClick={() => { setGenerated(true); setExported(false); }}
            className="ml-auto bg-purple-600 hover:bg-purple-700 text-white font-semibold px-6 py-2.5 rounded-xl shadow transition"
          >
            Calculate &amp; Preview →
          </button>
        </div>
      </div>

      {generated && (
        <>
          <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
            <div className="bg-gray-50 border-b border-gray-200 px-5 py-3 flex items-center justify-between">
              <span className="font-semibold text-gray-800">District Allocation by Fund Type</span>
              <span className="text-xs text-gray-500">Total: {fmt(amount)} · {alloc.length} districts · {FUND_TYPE_COUNT} fund types · {jePairs} JE pairs ({jeLines} GL lines)</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr className="text-left text-gray-500 uppercase tracking-wide bg-gray-50 border-b border-gray-200">
                    <th className="px-3 py-2.5 font-semibold">District</th>
                    <th className="px-3 py-2.5 font-semibold text-right">Share %</th>
                    <th className="px-3 py-2.5 font-semibold text-right">Total</th>
                    <th className="px-3 py-2.5 font-semibold text-right">F10 Ed</th>
                    <th className="px-3 py-2.5 font-semibold text-right">F20 O&M</th>
                    <th className="px-3 py-2.5 font-semibold text-right">F30 Debt</th>
                    <th className="px-3 py-2.5 font-semibold text-right">F40 Trans</th>
                    <th className="px-3 py-2.5 font-semibold text-right">F50 IMRF</th>
                    <th className="px-3 py-2.5 font-semibold text-right">F60 Cap</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {alloc.map(d => (
                    <tr key={d.id} className="hover:bg-gray-50">
                      <td className="px-3 py-2 font-medium text-gray-800">{d.short}</td>
                      <td className="px-3 py-2 text-right font-mono text-gray-600">{(d.pct*100).toFixed(2)}%</td>
                      <td className="px-3 py-2 text-right font-mono font-semibold text-gray-900">{fmt(d.distAmount)}</td>
                      <td className="px-3 py-2 text-right font-mono text-blue-700">{fmt(d.f10)}</td>
                      <td className="px-3 py-2 text-right font-mono text-gray-600">{fmt(d.f20)}</td>
                      <td className="px-3 py-2 text-right font-mono text-gray-600">{fmt(d.f30)}</td>
                      <td className="px-3 py-2 text-right font-mono text-gray-600">{fmt(d.f40)}</td>

                <span key={w} className={`text-xs font-semibold px-3 py-1 rounded-full ${roleColors[w] || 'bg-gray-100 text-gray-600'}`}>{w}</span>
              ))}
            </div>
          </div>

          {/* What it is */}
          <div>
            <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">What is this screen?</div>
            <p className="text-sm text-gray-700 leading-relaxed bg-purple-50 rounded-xl px-4 py-3">{h.whatItIs}</p>
          </div>

          {/* Step by step */}
          <div>
            <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">How to use it — step by step</div>
            <ol className="space-y-2">
              {h.steps.map((step, i) => (
                <li key={i} className="flex gap-3 text-sm text-gray-700">
                  <span className="w-6 h-6 rounded-full bg-purple-600 text-white text-xs font-bold flex items-center justify-center flex-shrink-0 mt-0.5">{i + 1}</span>
                  <span className="leading-relaxed">{step}</span>
                </li>
              ))}
            </ol>
          </div>

          {/* Where to go next */}
          <div>
            <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Where to go next</div>
            <div className="flex flex-wrap gap-2">
              {h.nextScreens.map(s => (
                <span key={s} className="text-xs font-medium px-3 py-1 rounded-full bg-gray-100 text-gray-600">→ {s}</span>
              ))}
            </div>
          </div>
        </div>

        {/* Footer */}
        <div className="px-7 py-4 border-t border-gray-100 flex justify-end">
          <button
            onClick={onClose}
            className="px-5 py-2 rounded-xl font-semibold text-sm text-white transition-colors"
            style={{ background: '#4A3B7C' }}
          >Got it, close</button>
        </div>
      </div>
    </div>
  );
}

            function NewInvestment({ setActive, investContext, setInvestContext, role }) {
        const ctx = investContext;
        const fmt  = (n) => n ? '$' + Math.round(n).toLocaleString() : '—';
        const fmtD = (n) => n ? '$' + parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';

        // PLACEHOLDER: V1 source = system_parameters.max_per_institution WHERE tenant_id = :tid
        const PAUL_CAP_PER_BANK = 4100000; // Paul's internal $4.1M per-bank limit (NOT Exhibit A 5% per issuer ~$18.7M)
        // PLACEHOLDER: V1 source = GET /api/v1/institutions?tenant_id=:tid&active=true
        // current values = portfolio_positions.SUM(par_value) WHERE institution_id = :iid
        const INSTITUTIONS = [
          {name:'Republic Bank',         acct:'#0936',  cap:null,    current:7000000,   type:'Bank'},
          {name:'Illinois Funds',         acct:'ILF',    cap:null,    current:53715673,  type:'Pool'},
          {name:'ISLAF / PMA (Matured 3/1/26)', acct:'ISLAF',  cap:null,    current:0,         type:'Pool', matured:true},
          {name:'First Horizon (Custodian — cap per issuer)', acct:'#5556',  cap:null,    current:64100000,  type:'Custodian'},
          {name:'Pan American Bank',      acct:'PAB',    cap:PAUL_CAP_PER_BANK, current:4330268,   type:'Bank'},
          {name:'AMAL Bank',              acct:'AMAL',   cap:PAUL_CAP_PER_BANK, current:4000000,   type:'Bank'},
          {name:'Liberty Bank',           acct:'LIB',    cap:PAUL_CAP_PER_BANK, current:3310000,   type:'Bank'},
          {name:'Northern Trust',         acct:'NT',     cap:PAUL_CAP_PER_BANK, current:2000000,   type:'Custodian'},
          {name:'Raymond James',          acct:'RJ',     cap:PAUL_CAP_PER_BANK, current:2345000,   type:'Custodian'},
          {name:'Bernardi Securities',    acct:'BER',    cap:PAUL_CAP_PER_BANK, current:1300000,   type:'Custodian'},
          {name:'Fifth Third',            acct:'5TH',    cap:PAUL_CAP_PER_BANK, current:7849701,   type:'Custodian'},
          // PLACEHOLDER: Goldman Sachs + Morgan Stanley held via First Horizon custodian — V1: cap checked per issuer from portfolio_positions WHERE custodian_id = first_horizon
          {name:'Goldman Sachs Bank',     acct:'GS',     cap:PAUL_CAP_PER_BANK, current:3400000,   type:'Bank'},
          {name:'Morgan Stanley Bank',    acct:'MS',     cap:PAUL_CAP_PER_BANK, current:3400000,   type:'Bank'},
        ];

        const INSTR_TYPES = [
          {val:'CD',       label:'CD - Certificate of Deposit',         isBond:false, defDC:'Actual/365', defFreq:'At Maturity'},
          {val:'Pool',     label:'Pool - Money Market (ILF / ISLAF)',   isBond:false, defDC:'N/A',        defFreq:'Daily'},
          {val:'Agency',   label:'Agency Bond (FHLB / FFCB / FNMA)',   isBond:true,  defDC:'30/360',     defFreq:'Semi-Annual'},
          {val:'Municipal',label:'Municipal Bond',                       isBond:true,  defDC:'30/360',     defFreq:'Semi-Annual'},
          {val:'Corporate',label:'Corporate Bond',                       isBond:true,  defDC:'30/360',     defFreq:'Semi-Annual'},
          {val:'TBill',    label:'T-Bill / Treasury',                    isBond:true,  defDC:'Actual/360', defFreq:'At Maturity'},
          {val:'MBS',      label:'MBS / Mortgage-Backed Security',       isBond:true,  defDC:'Actual/360', defFreq:'Monthly'},
          {val:'TAW',      label:'TAW - Tax Anticipation Warrant',       isBond:false, defDC:'Actual/365', defFreq:'At Maturity'},
        ];

        // Structured fields from investContext (Patch 129 — no more string parsing of option.label)
        const ctxInst = ctx && ctx.option && ctx.option.institution ? ctx.option.institution : '';
        const ctxRate = ctx && ctx.option && ctx.option.rate ? ctx.option.rate.replace('%','') : '';
        const ctxAmt  = ctx && ctx.option && ctx.option.amount ? String(ctx.option.amount) : '';
        const ctxInstrType = ctx && ctx.option && ctx.option.instrType ? ctx.option.instrType : null;

        const [inst,           setInst]           = React.useState(ctxInst);
        const [holdBank,       setHoldBank]        = React.useState('');
        const [instrType,      setInstrType]       = React.useState(ctxInstrType || (ctxInst === 'Illinois Funds' || ctxInst === 'ISLAF / PMA' ? 'Pool' : 'CD'));
        const [parVal,         setParVal]          = React.useState(ctxAmt);
        const [purchasePrice,  setPurchasePrice]   = React.useState(ctxAmt);
        const [priceDirty,     setPriceDirty]      = React.useState(false);
        const [coupon,         setCoupon]          = React.useState(ctxRate);
        const [couponFreq,     setCouponFreq]      = React.useState(ctxInst === 'Illinois Funds' || ctxInst === 'ISLAF / PMA' ? 'Daily' : 'At Maturity');
        const [dayCount,       setDayCount]        = React.useState(ctxInst === 'Illinois Funds' || ctxInst === 'ISLAF / PMA' ? 'N/A' : 'Actual/365');
        const [settlementDate, setSettlementDate]  = React.useState('');
        const [maturity,       setMaturity]        = React.useState('');
        const [lastCouponDate, setLastCouponDate]  = React.useState('');
        const [cusip,          setCusip]           = React.useState('');
        const [callable,       setCallable]        = React.useState(false);
        const [fundAlloc,      setFundAlloc]       = React.useState('Education Fund (10)');
        const [note,           setNote]            = React.useState('');
        const [submitted,      setSubmitted]       = React.useState(false);

        const instrDef = INSTR_TYPES.find(function(t){ return t.val === instrType; }) || INSTR_TYPES[0];
        const isBond   = instrDef.isBond;
        const isPool   = instrType === 'Pool';
        const showLastCoupon = isBond && couponFreq !== 'At Maturity';
        const parNum   = parseFloat(parVal) || 0;
        const priceNum = parseFloat(purchasePrice) || parNum;
        const selectedInst = INSTITUTIONS.find(function(i){ return i.name === inst; });

        const exhibitRemaining = selectedInst && selectedInst.cap ? Math.max(0, selectedInst.cap - selectedInst.current) : null;
        const overCap = exhibitRemaining !== null && parNum > 0 && parNum > exhibitRemaining;

        const handleParChange = function(val) {
          setParVal(val);
          if (!priceDirty) setPurchasePrice(val);
        };

        const accrDays = React.useMemo(function() {
          if (!showLastCoupon || !lastCouponDate || !settlementDate) return 0;
          const lcd = new Date(lastCouponDate);
          const sd  = new Date(settlementDate);
          if (sd <= lcd) return 0;
          if (dayCount === '30/360') {
            var d1 = lcd.getDate(), m1 = lcd.getMonth()+1, y1 = lcd.getFullYear();
            var d2 = sd.getDate(),  m2 = sd.getMonth()+1,  y2 = sd.getFullYear();
            if (d1 === 31) d1 = 30;
            if (d2 === 31 && d1 === 30) d2 = 30;
            return (y2-y1)*360 + (m2-m1)*30 + (d2-d1);
          }
          return Math.floor((sd - lcd) / 86400000);
        }, [showLastCoupon, lastCouponDate, settlementDate, dayCount]);

        const dayBasis = dayCount === 'Actual/360' ? 360 : dayCount === '30/360' ? 360 : 365;

        const accrued = showLastCoupon && parNum > 0 && parseFloat(coupon) > 0 && accrDays > 0
          ? parNum * (parseFloat(coupon)/100) * (accrDays / dayBasis)
          : 0;

        const isMidPeriod = showLastCoupon && accrDays > 0;

        const premium  = priceNum > parNum && parNum > 0 ? priceNum - parNum : 0;
        const discount = priceNum < parNum && parNum > 0 ? parNum - priceNum : 0;

        const nextCouponDate = React.useMemo(function() {
          if (!showLastCoupon || !lastCouponDate) return '';
          const lcd = new Date(lastCouponDate);
          const freqMonths = couponFreq === 'Semi-Annual' ? 6 : couponFreq === 'Annual' ? 12 : couponFreq === 'Quarterly' ? 3 : couponFreq === 'Monthly' ? 1 : 0;
          if (!freqMonths) return '';
          const next = new Date(lcd);
          const sd = settlementDate ? new Date(settlementDate) : new Date();
          while (next <= sd) { next.setMonth(next.getMonth() + freqMonths); }
          return next.toISOString().split('T')[0];
        }, [showLastCoupon, lastCouponDate, couponFreq, settlementDate]);

        const grossCouponPerPeriod = parNum > 0 && parseFloat(coupon) > 0
          ? parNum * (parseFloat(coupon)/100) * (couponFreq === 'Semi-Annual' ? 0.5 : couponFreq === 'Annual' ? 1 : couponFreq === 'Quarterly' ? 0.25 : couponFreq === 'Monthly' ? 1/12 : 0.5)
          : 0;
        const netToTDF = grossCouponPerPeriod - accrued;

        const ytmNum = React.useMemo(function() {
          if (!parNum || !parseFloat(coupon) || !maturity || !settlementDate) return null;
          const sd = new Date(settlementDate);
          const md = new Date(maturity);
          const years = Math.max(0.01, (md - sd) / (365 * 86400000));
          const annualCoupon = parNum * parseFloat(coupon) / 100;
          const ytm = ((annualCoupon + (parNum - priceNum)/years) / ((parNum + priceNum)/2)) * 100;
          return ytm.toFixed(2);
        }, [parNum, coupon, maturity, settlementDate, priceNum]);

        const totalCash = priceNum + accrued;

        const daysToMaturity = React.useMemo(function() {
          if (!maturity || !settlementDate) return null;
          return Math.round((new Date(maturity) - new Date(settlementDate)) / 86400000);
        }, [maturity, settlementDate]);

        const missingFields = [];
        if (!inst) missingFields.push('Institution');
        if (!parVal || parNum <= 0) missingFields.push('Par Value');
        if (!settlementDate) missingFields.push('Settlement Date');
        if (!isPool && !maturity) missingFields.push('Maturity Date');

        const canSubmit = missingFields.length === 0 && !overCap;

        const handleInstrChange = function(val) {
          setInstrType(val);
          const def = INSTR_TYPES.find(function(t){ return t.val === val; });
          if (def) { setDayCount(def.defDC); setCouponFreq(def.defFreq); }
          if (val === 'Pool') { setCoupon(''); setMaturity(''); setLastCouponDate(''); }
          setPriceDirty(false);
        };

        if (submitted) return (
          <div className="p-6 max-w-3xl mx-auto">
            <div className="bg-green-50 border border-green-200 rounded-xl p-6 text-center">
              <div className="text-3xl mb-2">✅</div>
              <div className="text-lg font-semibold text-gray-800 mb-1">Investment Logged</div>
              <div className="text-xs text-green-700 bg-green-100 border border-green-200 rounded px-3 py-1 inline-block mt-1 mb-1">✅ Auto-saved to Decision Log</div>
              {/* PLACEHOLDER: V1 source = portfolio_positions.confirm_status WHERE position_id=:new_id (defaults 'unconfirmed' on INSERT) */}
              <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-3 py-1 inline-block mt-1 mb-1">⚠ Status: Unconfirmed — will be verified on next {inst} statement</div>
              <div className="text-sm text-gray-600 mb-1">{inst} · {instrType} · {fmt(parNum)} par{cusip ? ' · CUSIP ' + cusip : ''}</div>
              {isMidPeriod && (
                <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-3 py-1.5 inline-block mt-2 mb-3">
                  Mid-period — added to First Coupon Tracker · Net to TDF: {fmtD(netToTDF)}
                </div>
              )}
              <div className="flex flex-wrap justify-center gap-3 mt-4">
                {ctx && (
                  <button onClick={function(){ setInvestContext(null); setActive('ai-recs'); }} className="text-sm px-4 py-2 bg-gray-100 text-gray-700 border border-gray-200 rounded-lg hover:bg-gray-200">
                    ← Back to AI Recs
                  </button>
                )}
                <button onClick={function(){ setInvestContext(null); setActive('cash-register'); }} className="text-sm px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700">📒 View in Cash Register</button>
                <button onClick={function(){ setInvestContext(null); setActive('portfolio'); }} className="text-sm px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">📊 View in Portfolio</button>
                <button onClick={function(){ setInvestContext(null); setActive('maturities'); }} className="text-sm px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">📅 View in Maturity Calendar</button>
                <button onClick={function(){ setInvestContext(null); setActive('decision-log'); }} className="text-sm px-4 py-2 bg-gray-700 text-white rounded-lg hover:bg-gray-800">📋 Decision Log</button>
                <button onClick={function(){ setSubmitted(false); setInst(''); setParVal(''); setPurchasePrice(''); setPriceDirty(false); setCoupon(''); setSettlementDate(''); setMaturity(''); setLastCouponDate(''); setCusip(''); setCallable(false); setNote(''); }} className="text-sm px-4 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50">New Entry</button>
              </div>
            </div>
          </div>
        );

        return (
          <div className="p-6 max-w-3xl mx-auto">
            {ctx && ctx.source && (
              <div className="mb-4">
                <button
                  onClick={() => setActive(ctx.source === 'maturities' ? 'maturities' : 'ai-recs')}
                  className="text-sm text-purple-600 hover:text-purple-800 font-medium flex items-center gap-1"
                >
                  ← Back to {ctx.source === 'maturities' ? 'Maturity Calendar' : 'AI Recs'}
                </button>
              </div>
            )}
            <div className="flex items-start justify-between mb-5">
              <div>
                <h2 className="text-xl font-semibold text-gray-900">New Investment Entry</h2>
                <p className="text-sm text-gray-500 mt-0.5">Feeds Portfolio, Maturity Calendar, Accrued Interest, and Decision Log · <span className="text-gray-400 text-xs">* Required</span></p>
              </div>
              {ctx && <div className="text-xs px-3 py-1.5 bg-purple-50 border border-purple-200 rounded-lg text-purple-700 shrink-0 ml-4">Pre-filled from AI Rec #{ctx.recId}</div>}
            </div>

            <div className="space-y-5">

              <div className="bg-white border border-gray-200 rounded-xl p-4">
                <div className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-3">Institution & Instrument</div>
                <div className="grid grid-cols-3 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-gray-600 mb-1">Institution (Buy From) *</label>
                    <select value={inst} onChange={function(e){ setInst(e.target.value); }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400">
                      <option value="">Select institution...</option>
                      {INSTITUTIONS.filter(function(i){ return !i.matured; }).map(function(i){ var overCap = i.cap && i.current >= i.cap; return <option key={i.name} value={i.name}>{i.name}{overCap ? ' ⚠ OVER CAP' : (i.cap ? ' (cap ' + fmt(i.cap) + ')' : '')}</option>; })}
                    </select>
                    {selectedInst && selectedInst.cap && (
                      <div className={"text-xs mt-1 font-semibold " + (overCap ? 'text-red-600' : 'text-green-600')}>
                        {overCap
                          ? "Over Paul's " + fmt(PAUL_CAP_PER_BANK) + " internal cap by " + fmt(parNum - exhibitRemaining)
                          : parNum > 0
                            ? fmt(exhibitRemaining) + " remaining under Paul's " + fmt(PAUL_CAP_PER_BANK) + " internal cap"
                            : fmt(exhibitRemaining) + " available (Paul's " + fmt(PAUL_CAP_PER_BANK) + " internal cap)"
                        }
                      </div>
                    )}
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-gray-600 mb-1">Holding Bank (Held At)</label>
                    <select value={holdBank} onChange={function(e){ setHoldBank(e.target.value); }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400">
                      <option value="">Same as institution above...</option>
                      {INSTITUTIONS.filter(function(i){ return !i.matured; }).map(function(i){ return <option key={i.name} value={i.name}>{i.name}</option>; })}
                    </select>
                    <p className="text-xs text-gray-400 mt-1">Direct CD: same as institution · Brokered CD / agency bond: custodian that holds the security (e.g. First Horizon)</p>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-gray-600 mb-1">Instrument Type *</label>
                    <select value={instrType} onChange={function(e){ handleInstrChange(e.target.value); }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400">
                      {INSTR_TYPES.map(function(t){ return <option key={t.val} value={t.val}>{t.label}</option>; })}
                    </select>
                    {isPool && (
                      <p className="text-xs text-blue-600 bg-blue-50 rounded px-2 py-1 mt-1.5">Daily interest - no maturity, no coupon schedule, no accrued at purchase</p>
                    )}
                  </div>
                </div>
                {!isPool && (
                  <div className="grid grid-cols-2 gap-4 mt-3">
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">CUSIP <span className="font-normal text-gray-400">(optional)</span></label>
                      <input type="text" value={cusip} onChange={function(e){ setCusip(e.target.value.toUpperCase()); }} placeholder="e.g. 3130ABCD1" maxLength={9} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-purple-400" />
                    </div>
                    {isBond && (
                      <div className="flex items-center pt-5">
                        <label className="flex items-center gap-2 cursor-pointer select-none">
                          <input type="checkbox" checked={callable} onChange={function(e){ setCallable(e.target.checked); }} className="w-4 h-4 rounded border-gray-300" />
                          <span className="text-sm text-gray-700">Callable bond</span>
                          <span className="text-xs text-gray-400">(flags on Maturity Calendar)</span>
                        </label>
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="bg-white border border-gray-200 rounded-xl p-4">
                <div className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-3">Financial Terms</div>
                <div className="grid grid-cols-3 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-gray-600 mb-1">Par / Face Value ($) *</label>
                    <input type="number" value={parVal} onChange={function(e){ handleParChange(e.target.value); }} placeholder="e.g. 4100000" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400" />
                  </div>
                  {isBond && (
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">
                        Purchase Price ($)
                        {premium > 0 && <span className="ml-1 font-normal text-amber-600">+{fmt(premium)} prem</span>}
                        {discount > 0 && <span className="ml-1 font-normal text-blue-600">-{fmt(discount)} disc</span>}
                      </label>
                      <input type="number" value={purchasePrice} onChange={function(e){ setPurchasePrice(e.target.value); setPriceDirty(e.target.value !== parVal); }} placeholder="Defaults to par - edit if premium or discount" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400" />
                      {parNum > 0 && !priceDirty && <p className="text-xs text-gray-400 mt-1">At par - {fmtD(parNum)}</p>}
                    </div>
                  )}
                  {!isPool && (
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Coupon / Interest Rate (%)</label>
                      <input type="number" step="0.001" value={coupon} onChange={function(e){ setCoupon(e.target.value); }} placeholder="e.g. 3.77" className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400" />
                    </div>
                  )}
                </div>
                {isBond && (
                  <div className="grid grid-cols-2 gap-4 mt-3">
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Coupon Frequency</label>
                      <select value={couponFreq} onChange={function(e){ setCouponFreq(e.target.value); }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400">
                        {['Semi-Annual','Annual','Quarterly','Monthly','At Maturity'].map(function(f){ return <option key={f}>{f}</option>; })}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Day Count Convention</label>
                      <select value={dayCount} onChange={function(e){ setDayCount(e.target.value); }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400">
                        {['30/360','Actual/365','Actual/360','Actual/Actual'].map(function(d){ return <option key={d}>{d}</option>; })}
                      </select>
                    </div>
                  </div>
                )}
              </div>

              <div className="bg-white border border-gray-200 rounded-xl p-4">
                <div className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-3">Dates</div>
                <div className="grid grid-cols-3 gap-4">
                  <div>
                    <label className="block text-xs font-semibold text-gray-600 mb-1">Settlement Date *</label>
                    <input type="date" value={settlementDate} onChange={function(e){ setSettlementDate(e.target.value); }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400" />
                    <p className="text-xs text-gray-400 mt-1">When Paul pays - typically T+1 or T+2</p>
                  </div>
                  {!isPool && (
                    <div>
                      <label className="block text-xs font-semibold text-gray-600 mb-1">Maturity Date *</label>
                      <input type="date" value={maturity} onChange={function(e){ setMaturity(e.target.value); }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400" />
                      {daysToMaturity && <p className="text-xs text-gray-400 mt-1">{daysToMaturity} days - {(daysToMaturity/365).toFixed(1)} yrs</p>}

                        {(ingest.parseHistory||[]).length > 0 ? (
                          <div>
                            <div className="text-xs font-semibold text-gray-600 mb-2">Parse History</div>

                                <tr key={hi} className="border-t border-gray-100 bg-white">

                                  <td className="px-3 py-2 text-right text-gray-700">{h.items}</td>
                                  <td className="px-3 py-2 text-right"><span className={`font-semibold ${h.conf >= 90 ? 'text-green-600' : h.conf >= 75 ? 'text-amber-600' : 'text-red-500'}`}>{h.conf}%</span></td>
                                  <td className="px-3 py-2 text-right">{h.flags > 0 ? <span className="text-amber-600 font-semibold">{h.flags}</span> : <span className="text-green-600">\u2713</span>}</td>
                                </tr>
                              ))}</tbody>
                            </table>
                            {(ingest.parseHistory||[]).length >= 2 && (
                              <div className="text-xs text-gray-400 mt-2 italic">
                                Confidence trend: {(ingest.parseHistory||[])[ingest.parseHistory.length-1].conf}% \u2192 {(ingest.parseHistory||[])[0].conf}% \u2014 {(ingest.parseHistory||[])[0].conf > (ingest.parseHistory||[])[ingest.parseHistory.length-1].conf ? '\u2191 improving with each validation' : 'stable'}
                              </div>
                            )}
                          </div>
                        ) : (
                          <div className="text-xs text-gray-400 italic bg-white border border-gray-100 rounded-lg p-3">
                            No parse history yet. Upload the first statement to begin building this institution\u2019s parser record.
                          </div>
                        )}
                        {ingest.flagged > 0 && (
                          <div className="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800">
                            <span className="font-semibold">{ingest.flagged} item{ingest.flagged > 1 ? 's' : ''} flagged in last run.</span> <button onClick={() => setActive('uploads')} className="underline font-semibold">Review in Upload Statements \u2192</button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          </React.Fragment>);
        })}
      </div>
      )}

      <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-800">
        <strong>Annual Review Required:</strong> This list must be approved by the Board of Trustees at the first meeting of each calendar year. Holicow blocks New Investment Entry for unapproved institutions. <span className="ml-2 font-semibold">Next review: January 2027.</span>
      </div>
      <div className="mt-3 flex items-center gap-4 pt-3 border-t border-gray-100">
        <button onClick={() => setActive('uploads')} className="text-xs font-semibold text-gray-500 hover:text-gray-800 hover:underline">📤 Upload Statements →</button>
        <span className="text-gray-200">|</span>
        <button onClick={() => setActive('compliance')} className="text-xs font-semibold text-gray-500 hover:text-gray-800 hover:underline">✅ Compliance Rules →</button>
        <span className="text-gray-200">|</span>
        <button onClick={() => setActive('new-investment')} className="text-xs font-semibold text-gray-500 hover:text-gray-800 hover:underline">➕ New Investment →</button>
      </div>
      <div className="mt-4 p-4 bg-blue-50 border border-blue-200 rounded-xl text-xs">
        <div className="font-bold text-blue-800 mb-2">🔍 Open Questions — Institution Registry</div>
        <ul className="space-y-1 text-blue-700">
          <li>• <strong>Republic Bank CD ($15M):</strong> Confirm reinvestment after Jan 20, 2026 maturity — moved to ILF or redeployed elsewhere?</li>
          <li>• <strong>ISLAF / PMA (TAW):</strong> Confirm proceeds from Mar 1, 2026 maturity — returned to #0936 or reinvested?</li>
          <li>• <strong>First Horizon CD Portfolio:</strong> Confirm $64.1M total correct for Dec 31, 2025 (16 CDs per safekeeping statement) — any matured since?</li>
          <li>• <strong>Republic NOW balance:</strong> Confirm $135.8M is the Dec 31, 2025 ending balance for account #7661.</li>
          <li>• <strong>Annual Board Review:</strong> Was the institution list formally re-approved at Jan 2026 board meeting? Board Approved dates may need updating to Jan 2026.</li>
        </ul>
      </div>
    </div>
  );
}
